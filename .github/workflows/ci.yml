# CI for @mcp-rune/create.
#
# Triggers:
#   - push to main           → runs `ci` job (typecheck, lint, test, build,
#                              + scaffold-and-typecheck smoke against the
#                              published @mcp-rune/mcp-rune).
#   - push of a `v*` tag     → runs `ci`, and on success runs `publish`.
#
# The scaffold smoke job is the equivalent of mcp-rune-examples' templates
# matrix: it makes sure the CLI's emitted code still type-checks against the
# library after every change to either side.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

# Opt every job into Node 24 for the actions themselves (checkout, setup-node)
# so the GitHub Actions runtime stops printing the Node 20 deprecation warning
# on every job. The `with: node-version: 24` already sets the *workflow's* Node,
# but composite actions still run under Node 20 by default until 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build:check

      - name: Build
        # The CLI ships compiled dist/; build first so prepublishOnly is a
        # no-op at publish time.
        run: npm run build

      - name: Test
        run: npm test

  publish:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # registry-url + scope tell setup-node to write a project .npmrc
          # that authenticates against GitHub Packages and reads the token
          # from $NODE_AUTH_TOKEN. publishConfig.registry in package.json
          # overrides the target at publish time, sending the artifact to
          # public npmjs.org instead.
          registry-url: https://npm.pkg.github.com
          scope: '@mcp-rune'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # The CLI ships compiled dist/; build first so prepublishOnly is a
        # no-op at publish time.
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          # GITHUB_TOKEN is auto-provisioned by Actions. With permissions:
          # packages: write, it has push rights to npm.pkg.github.com for
          # this repo's scope.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
