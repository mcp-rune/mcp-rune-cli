# CI for @mcp-rune/create.
#
# Triggers:
#   - push to main           → runs `ci` job (typecheck, lint, test, build,
#                              + scaffold-and-typecheck smoke against the
#                              published @mcp-rune/mcp-rune).
#   - push of a `v*` tag     → runs `ci`, and on success runs `publish`.
#
# The scaffold smoke job is the equivalent of mcp-rune-examples' templates
# matrix: it makes sure the CLI's emitted code still type-checks against the
# library after every change to either side.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

# Opt every job into Node 24 for the actions themselves (checkout, setup-node)
# so the GitHub Actions runtime stops printing the Node 20 deprecation warning
# on every job. The `with: node-version: 24` already sets the *workflow's* Node,
# but composite actions still run under Node 20 by default until 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build:check

      - name: Build
        # The CLI ships compiled dist/; build first so prepublishOnly is a
        # no-op at publish time.
        run: npm run build

      - name: Test
        run: npm test

  publish:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write lets `npm publish --provenance` OIDC-sign the
      # tarball against this Actions run, so npmjs.com can show a
      # verifiable link back to the source commit.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # registry-url + scope make setup-node write a project .npmrc
          # mapping the @mcp-rune scope to npmjs.com. A scoped mapping
          # OVERRIDES package.json's publishConfig.registry at runtime — so it
          # must point at the same registry we publish to. Pointing it at
          # GitHub Packages is what silently retargeted v0.11.1 there.
          registry-url: https://registry.npmjs.org
          scope: '@mcp-rune'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # The CLI ships compiled dist/; build first so prepublishOnly is a
        # no-op at publish time.
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          # NPM_TOKEN is an npm automation token (granular or classic) with
          # publish rights to the @mcp-rune scope on registry.npmjs.org.
          # Add it under repo Settings → Secrets and variables → Actions.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
